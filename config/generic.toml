#
# Generic configuration file for unsupported systems.  Does not provide an
# example [sandboxes] section as it is highly OS-specific.
#

#
# General configuration variables.
#
[options]
build_threads = 4
scan_threads = 4
verbose = true

#
# Variables that configure pkgsrc, where it is, what packages to build, etc.
#
[pkgsrc]
basedir = "/usr/pkgsrc"
make = "/usr/pkg/bin/bmake"
pkgpaths = [
	"mail/mutt",
	"sysutils/coreutils",
]

[scripts]
pkg-scan = "scripts/pkg-scan"
pkg-build = "scripts/pkg-build"
pkg-up-to-date = "scripts/pkg-up-to-date"

[build]
bulklog = "/tmp/bulklog"
packages = "/tmp/packages"
keep_wrkdir = false
keep_prefix = false
skip_age_check = false
use_destdir = true
pkg_info = "/usr/pkg/sbin/pkg_info"
